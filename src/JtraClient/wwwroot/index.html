<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JTRA - JIRA Time Recording</title>
    <base href="/" />
    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#1b6ec2" />
    <link href="JtraClient.styles.css" rel="stylesheet" />
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@microsoft/signalr@8.0.7/dist/browser/signalr.min.js"></script>
    <script src="_framework/blazor.webassembly.js" autostart="false"></script>
    <script>
        // Clear stale service workers/caches to prevent mixed runtime payloads after upgrades.
        async function clearClientCaches() {
            if ('serviceWorker' in navigator) {
                const registrations = await navigator.serviceWorker.getRegistrations();
                for (const registration of registrations) {
                    await registration.unregister();
                }
            }

            if ('caches' in window) {
                const keys = await caches.keys();
                await Promise.all(keys.map(key => caches.delete(key)));
            }
        }

        // Disable integrity checking (SRI hashes get stale during dev rebuilds).
        // Returning a fetch() Promise bypasses Blazor's integrity validation.
        (async function startBlazor() {
            await clearClientCaches();
            const cacheBust = `v=${Date.now()}`;

            await Blazor.start({
                loadBootResource: function (type, name, defaultUri, integrity) {
                    if (type === 'dotnetjs') {
                        return `${defaultUri}${defaultUri.includes('?') ? '&' : '?'}${cacheBust}`;
                    }
                    const resourceUrl = `${defaultUri}${defaultUri.includes('?') ? '&' : '?'}${cacheBust}`;
                    return fetch(resourceUrl, { cache: 'no-cache' });
                }
            });
        })();

        window.timerHubInterop = {
            connection: null,
            dotNetRef: null,

            async start(serverUrl, dotNetRef) {
                if (this.connection) {
                    return;
                }

                this.dotNetRef = dotNetRef;
                this.connection = new signalR.HubConnectionBuilder()
                    .withUrl(`${serverUrl.replace(/\/$/, '')}/timerHub`)
                    .withAutomaticReconnect([0, 2000, 5000, 10000])
                    .build();

                this.connection.on("TimerTick", async (time) => {
                    await this.dotNetRef.invokeMethodAsync("HandleTimerTick", time);
                });

                this.connection.onreconnecting(async () => {
                    await this.dotNetRef.invokeMethodAsync("HandleConnectionChanged", false);
                });

                this.connection.onreconnected(async () => {
                    await this.dotNetRef.invokeMethodAsync("HandleConnectionChanged", true);
                });

                this.connection.onclose(async () => {
                    await this.dotNetRef.invokeMethodAsync("HandleConnectionChanged", false);
                });

                try {
                    await this.connection.start();
                    await this.dotNetRef.invokeMethodAsync("HandleConnectionChanged", true);
                } catch {
                    await this.dotNetRef.invokeMethodAsync("HandleConnectionChanged", false);
                }
            },

            async stop() {
                if (!this.connection) {
                    return;
                }

                const connection = this.connection;
                this.connection = null;
                this.dotNetRef = null;
                await connection.stop();
            }
        };

        window.indexedDbInterop = {
            db: null,
            dbName: 'JtraDb',
            dbVersion: 2,

            init: function() {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(this.dbName, this.dbVersion);
                    
                    request.onerror = () => reject(request.error);
                    request.onsuccess = () => {
                        this.db = request.result;
                        resolve();
                    };
                    
                    request.onupgradeneeded = (event) => {
                        const db = event.target.result;
                        
                        if (!db.objectStoreNames.contains('time_entries')) {
                            const entriesStore = db.createObjectStore('time_entries', { keyPath: 'id', autoIncrement: true });
                            entriesStore.createIndex('date', 'date', { unique: false });
                        }
                        
                        if (!db.objectStoreNames.contains('settings')) {
                            db.createObjectStore('settings', { keyPath: 'key' });
                        }
                        
                        if (!db.objectStoreNames.contains('ticket_cache')) {
                            const cacheStore = db.createObjectStore('ticket_cache', { keyPath: 'ticketKey' });
                            cacheStore.createIndex('lastUsedAt', 'lastUsedAt', { unique: false });
                        }
                        
                        if (!db.objectStoreNames.contains('connection_state')) {
                            db.createObjectStore('connection_state', { keyPath: 'id' });
                        }

                        if (!db.objectStoreNames.contains('task_entries')) {
                            const taskStore = db.createObjectStore('task_entries', { keyPath: 'id', autoIncrement: true });
                            taskStore.createIndex('category', 'category', { unique: false });
                            taskStore.createIndex('subcategory', 'subcategory', { unique: false });
                        }
                    };
                });
            },

            getAllEntries: function() {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction(['time_entries'], 'readonly');
                    const store = transaction.objectStore('time_entries');
                    const request = store.getAll();
                    
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            },

            getEntry: function(id) {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction(['time_entries'], 'readonly');
                    const store = transaction.objectStore('time_entries');
                    const request = store.get(id);
                    
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            },

            addEntry: function(entry) {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction(['time_entries'], 'readwrite');
                    const store = transaction.objectStore('time_entries');
                    const request = store.add(entry);
                    
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            },

            updateEntry: function(entry) {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction(['time_entries'], 'readwrite');
                    const store = transaction.objectStore('time_entries');
                    const request = store.put(entry);
                    
                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                });
            },

            deleteEntry: function(id) {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction(['time_entries'], 'readwrite');
                    const store = transaction.objectStore('time_entries');
                    const request = store.delete(id);
                    
                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                });
            },

            getEntriesByDate: function(date) {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction(['time_entries'], 'readonly');
                    const store = transaction.objectStore('time_entries');
                    const index = store.index('date');
                    const request = index.getAll(date);
                    
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            },

            getAllTaskEntries: function() {
                return new Promise((resolve, reject) => {
                    if (!this.db || !this.db.objectStoreNames.contains('task_entries')) {
                        resolve([]);
                        return;
                    }
                    const transaction = this.db.transaction(['task_entries'], 'readonly');
                    const store = transaction.objectStore('task_entries');
                    const request = store.getAll();

                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            },

            getTaskEntry: function(id) {
                return new Promise((resolve, reject) => {
                    if (!this.db || !this.db.objectStoreNames.contains('task_entries')) {
                        resolve(null);
                        return;
                    }
                    const transaction = this.db.transaction(['task_entries'], 'readonly');
                    const store = transaction.objectStore('task_entries');
                    const request = store.get(id);

                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            },

            addTaskEntry: function(entry) {
                return new Promise((resolve, reject) => {
                    if (!this.db || !this.db.objectStoreNames.contains('task_entries')) {
                        reject(new Error('task_entries store is unavailable. Reload the app to apply DB migration.'));
                        return;
                    }
                    const transaction = this.db.transaction(['task_entries'], 'readwrite');
                    const store = transaction.objectStore('task_entries');
                    const request = store.add(entry);

                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            },

            updateTaskEntry: function(entry) {
                return new Promise((resolve, reject) => {
                    if (!this.db || !this.db.objectStoreNames.contains('task_entries')) {
                        reject(new Error('task_entries store is unavailable. Reload the app to apply DB migration.'));
                        return;
                    }
                    const transaction = this.db.transaction(['task_entries'], 'readwrite');
                    const store = transaction.objectStore('task_entries');
                    const request = store.put(entry);

                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                });
            },

            deleteTaskEntry: function(id) {
                return new Promise((resolve, reject) => {
                    if (!this.db || !this.db.objectStoreNames.contains('task_entries')) {
                        reject(new Error('task_entries store is unavailable. Reload the app to apply DB migration.'));
                        return;
                    }
                    const transaction = this.db.transaction(['task_entries'], 'readwrite');
                    const store = transaction.objectStore('task_entries');
                    const request = store.delete(id);

                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                });
            },

            getSettings: function() {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction(['settings'], 'readonly');
                    const store = transaction.objectStore('settings');
                    const request = store.get('appSettings');
                    
                    request.onsuccess = () => {
                        if (request.result) {
                            resolve(request.result.value);
                        } else {
                            resolve(null);
                        }
                    };
                    request.onerror = () => reject(request.error);
                });
            },

            saveSettings: function(settings) {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction(['settings'], 'readwrite');
                    const store = transaction.objectStore('settings');
                    const request = store.put({ key: 'appSettings', value: settings });
                    
                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                });
            },

            getTicketFromCache: function(ticketKey) {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction(['ticket_cache'], 'readonly');
                    const store = transaction.objectStore('ticket_cache');
                    const request = store.get(ticketKey);
                    
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            },

            getAllCachedTickets: function() {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction(['ticket_cache'], 'readonly');
                    const store = transaction.objectStore('ticket_cache');
                    const request = store.getAll();
                    
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            },

            addTicketToCache: function(ticket) {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction(['ticket_cache'], 'readwrite');
                    const store = transaction.objectStore('ticket_cache');
                    const request = store.put(ticket);
                    
                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                });
            },

            updateTicketCache: function(ticket) {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction(['ticket_cache'], 'readwrite');
                    const store = transaction.objectStore('ticket_cache');
                    const request = store.put(ticket);
                    
                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                });
            },

            deleteCachedTicket: function(ticketKey) {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction(['ticket_cache'], 'readwrite');
                    const store = transaction.objectStore('ticket_cache');
                    const request = store.delete(ticketKey);
                    
                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                });
            },

            clearTicketCache: function() {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction(['ticket_cache'], 'readwrite');
                    const store = transaction.objectStore('ticket_cache');
                    const request = store.clear();
                    
                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                });
            },

            getConnectionState: function() {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction(['connection_state'], 'readonly');
                    const store = transaction.objectStore('connection_state');
                    const request = store.get('current');
                    
                    request.onsuccess = () => resolve(request.result || null);
                    request.onerror = () => reject(request.error);
                });
            },

            saveConnectionState: function(state) {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction(['connection_state'], 'readwrite');
                    const store = transaction.objectStore('connection_state');
                    const request = store.put({ id: 'current', ...state });
                    
                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                });
            },

            clearAllData: function() {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction(['time_entries', 'settings', 'ticket_cache', 'connection_state', 'task_entries'], 'readwrite');
                    
                    const promises = ['time_entries', 'settings', 'ticket_cache', 'connection_state', 'task_entries'].map(storeName => {
                        return new Promise((res, rej) => {
                            const store = transaction.objectStore(storeName);
                            const request = store.clear();
                            request.onsuccess = () => res();
                            request.onerror = () => rej(request.error);
                        });
                    });
                    
                    Promise.all(promises).then(resolve).catch(reject);
                });
            },

            clearAllEntries: function() {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction(['time_entries'], 'readwrite');
                    const store = transaction.objectStore('time_entries');
                    const request = store.clear();
                    
                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                });
            }
        };

        window.notificationInterop = {
            requestPermission: function() {
                return Notification.requestPermission();
            },

            hasPermission: function() {
                return Notification.permission === 'granted';
            },

            show: function(title, body) {
                if (!('Notification' in window)) {
                    return 'unsupported';
                }

                if (Notification.permission !== 'granted') {
                    return `permission-${Notification.permission}`;
                }

                const notification = new Notification(title, {
                    body: body,
                    icon: '/icon-192.png',
                    requireInteraction: true
                });

                notification.onclick = function() {
                    window.focus();
                    notification.close();
                };

                return 'shown';
            }
        };

        window.downloadFile = function(filename, mimeType, base64Content) {
            const link = document.createElement('a');
            link.href = 'data:' + mimeType + ';base64,' + base64Content;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        };

        window.getSelectedFiles = function() {
            const input = document.querySelector('input[type="file"]');
            if (input && input.files && input.files.length > 0) {
                return Array.from(input.files).map(f => f.name);
            }
            return [];
        };

        window.readFileContent = function() {
            return new Promise((resolve, reject) => {
                const input = document.querySelector('input[type="file"]');
                if (!input || !input.files || input.files.length === 0) {
                    resolve(null);
                    return;
                }
                const file = input.files[0];
                const reader = new FileReader();
                reader.onload = function(e) {
                    resolve(e.target.result);
                };
                reader.onerror = function() {
                    resolve(null);
                };
                reader.readAsText(file);
            });
        };
    </script>
</body>

</html>
